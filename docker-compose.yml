services:
  # ─────────────────────────────────────────────
  # Actual Budget Server
  # ─────────────────────────────────────────────
  actual-server:
    image: actualbudget/actual-server:latest
    container_name: actual-server
    restart: unless-stopped
    ports:
      - "${ACTUAL_PORT:-5006}:5006"
    volumes:
      - actual-data:/data
    environment:
      - ACTUAL_DATA_DIR=/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5006/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - budget-network

  # ─────────────────────────────────────────────
  # Integration Service (this app)
  # ─────────────────────────────────────────────
  integration-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: budget-integration-service
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      # Override to point at the docker service name, not external IP
      - ACTUAL_SERVER_URL=http://actual-server:5006
      - ACTUAL_DATA_DIR=/app/budget-data
      - HOST=0.0.0.0
    volumes:
      - integration-db:/app/database
      - integration-budget-data:/app/budget-data
    depends_on:
      actual-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - budget-network

volumes:
  actual-data:
    driver: local
  integration-db:
    driver: local
  integration-budget-data:
    driver: local

networks:
  budget-network:
    driver: bridge
